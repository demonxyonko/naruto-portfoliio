<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Naruto World Explorer</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-text">Initializing Shinobi Database...</div>
    <div class="loading-bar">
      <div class="progress"></div>
    </div>
    <div class="loading-percent">0%</div>
  </div>

  <!-- Home Screen -->
  <div id="home-screen" class="hidden">
    <div class="logo-container">
      <h1 class="logo">NARUTO WORLD EXPLORER</h1>
      <p class="subtitle">Explore every village, every battle, every legendary location from the Naruto Universe.</p>
    </div>
    <div class="menu">
      <button class="menu-btn" id="enter-world">ENTER WORLD</button>
      <button class="menu-btn">CHARACTERS</button>
      <button class="menu-btn">LORE</button>
      <button class="menu-btn">ABOUT</button>
    </div>
    <canvas id="background-canvas"></canvas>
  </div>

  <script src="script.js"></script>
</body>
</html>
